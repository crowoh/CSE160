<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ASG0</title>
</head>
<body onload="main()">
  <canvas id="example" width="400" height="400" style="background: black;"></canvas>

  <div>
    <label for="v1x">v1 x</label>
    <input id="v1x" type="number" step="any" value="2.25">

    <label for="v1y">v1 y</label>
    <input id="v1y" type="number" step="any" value="2.25">
  </div>

  <div>
    <label for="v2x">v2 x</label>
    <input id="v2x" type="number" step="any" value="1">

    <label for="v2y">v2 y</label>
    <input id="v2y" type="number" step="any" value="1">
  </div>

  <div>
    <button type="button" onclick="handleDrawEvent()">Draw</button>
  </div>

  <div>
    <label for="operation">Operation</label>
    <select id="operation">
      <option value="add">Add</option>
      <option value="sub">Subtract</option>
      <option value="mul">Multiply</option>
      <option value="div">Divide</option>
      <option value="magnitude">Magnitude</option>
      <option value="normalize">Normalize</option>
      <option value="angle">Angle between</option>
      <option value="area">Area</option>
    </select>

    <label for="scalar">Scalar</label>
    <input id="scalar" type="number" step="any" value="2">

    <button type="button" onclick="handleDrawOperationEvent()">Draw Operation</button>
  </div>

  <script src="lib/cuon-matrix-cse160.js"></script>
  <script src="asg0.js"></script>
</body>
</html>
